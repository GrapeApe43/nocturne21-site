name: publish

on:
  push:
    paths:
      - "js/comic_settings.js"
      - "generate-rss.py"
      - "n21-journal-data.js"
      - "publish-journal.py"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests feedgen pytumblr

      - name: Run comic automation
        run: python generate-rss.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN: ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_SECRET: ${{ secrets.TUMBLR_OAUTH_SECRET }}

      - name: Run journal automation
        run: python publish-journal.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN: ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_SECRET: ${{ secrets.TUMBLR_OAUTH_SECRET }}

      # 🔥 THIS IS THE FIX FOR DISCORD SPAM
      - name: Save journal tracker to repo
        run: |
          if [ -f .last_journal_post.txt ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .last_journal_post.txt
            git diff --cached --quiet || git commit -m "Update journal tracker"
            git push
          fi

      - name: Upload rss.xml to Neocities
        run: |
          curl -u "${{ secrets.NEOCITIES_USERNAME }}:${{ secrets.NEOCITIES_API_KEY }}" \
          -F "rss.xml=@rss.xml" \
          https://neocities.org/api/upload

      - name: Upload journal-rss.xml to Neocities
        run: |
          curl -u "${{ secrets.NEOCITIES_USERNAME }}:${{ secrets.NEOCITIES_API_KEY }}" \
          -F "journal-rss.xml=@journal-rss.xml" \
          https://neocities.org/api/upload
