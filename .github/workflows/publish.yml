name: publish

on:
  push:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests feedgen pytumblr

      - name: Generate comic RSS and publish comic socials
        run: python generate-rss.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN: ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_SECRET: ${{ secrets.TUMBLR_OAUTH_SECRET }}

      - name: Generate journal RSS and publish journal socials
        run: python publish-journal.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN: ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_SECRET: ${{ secrets.TUMBLR_OAUTH_SECRET }}

      - name: Collect changed files for Neocities
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BEFORE="$(git rev-parse HEAD^ 2>/dev/null || true)"
            AFTER="$(git rev-parse HEAD)"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
          fi

          if [ -n "$BEFORE" ]; then
            CHANGED="$(git diff --name-only "$BEFORE" "$AFTER")"
          else
            CHANGED="$(git diff-tree --no-commit-id --name-only -r HEAD)"
          fi

          {
            echo "$CHANGED"
            echo "rss.xml"
            echo "journal-rss.xml"
          } | sort -u > all_changed.txt

          > deploy_files.txt
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            case "$file" in
              .github/*|*.py|*.yml|*.yaml|README*|LICENSE*|.gitignore|.last_* )
                continue
                ;;
              *)
                echo "$file" >> deploy_files.txt
                ;;
            esac
          done < all_changed.txt

          echo "Files to upload:"
          cat deploy_files.txt || true

      - name: Upload changed files to Neocities
        shell: bash
        run: |
          if [ ! -s deploy_files.txt ]; then
            echo "No deployable files changed."
            exit 0
          fi

          args=()
          while IFS= read -r file; do
            args+=(-F "$file=@$file")
          done < deploy_files.txt

          curl -u "${{ secrets.NEOCITIES_USERNAME }}:${{ secrets.NEOCITIES_API_KEY }}" \
            "${args[@]}" \
            https://neocities.org/api/upload
