name: publish

permissions:
  contents: write

concurrency:
  group: publish-main
  cancel-in-progress: false

on:
  push:
    paths:
      - "js/comic_settings.js"
      - "generate-rss.py"
      - "n21-journal-data.js"
      - "publish-journal.py"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests feedgen pytumblr

      # ✅ ALWAYS runs (safe)
      - name: Generate RSS only
        run: python generate-rss.py

      # 🔴 ONLY runs when you manually click "Run workflow"
      - name: Post comic to social media
        if: github.event_name == 'workflow_dispatch'
        run: python generate-rss.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN: ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_SECRET: ${{ secrets.TUMBLR_OAUTH_SECRET }}

      - name: Post journal to social media
        if: github.event_name == 'workflow_dispatch'
        run: python publish-journal.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN: ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_SECRET: ${{ secrets.TUMBLR_OAUTH_SECRET }}

      # 🔴 Only update tracker when posting actually happens
      - name: Save journal tracker to repo
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -f .last_journal_post.txt ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add .last_journal_post.txt

            if ! git diff --cached --quiet; then
              git commit -m "Update journal tracker"
              git pull --rebase origin main
              git push origin main
            fi
          fi

      # ✅ ALWAYS upload RSS (safe)
      - name: Upload rss.xml to Neocities
        run: |
          curl -u "${{ secrets.NEOCITIES_USERNAME }}:${{ secrets.NEOCITIES_API_KEY }}" \
          -F "rss.xml=@rss.xml" \
          https://neocities.org/api/upload

      - name: Upload journal-rss.xml to Neocities
        if: hashFiles('journal-rss.xml') != ''
        run: |
          curl -u "${{ secrets.NEOCITIES_USERNAME }}:${{ secrets.NEOCITIES_API_KEY }}" \
          -F "journal-rss.xml=@journal-rss.xml" \
          https://neocities.org/api/upload
