name: Deploy to Neocities

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Neocities CLI
        run: npm install -g neocities

      - name: Deploy to Neocities
        run: neocities push . --api_key ${{ secrets.NEOCITIES_API_KEY }}
