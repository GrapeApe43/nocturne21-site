name: Deploy to Neocities

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create clean deploy folder
        run: |
          rm -rf deploy
          mkdir deploy

          # CORE SITE FOLDERS
          cp -r css deploy/
          cp -r js deploy/
          cp -r img deploy/
          cp -r lytebox deploy/ 2>/dev/null || true

          # HTML FILES
          cp *.html deploy/

          # RSS + DATA FILES
          cp *.xml deploy/ 2>/dev/null || true
          cp *.js deploy/ 2>/dev/null || true

          # OPTIONAL (if you use them)
          cp favicon.* deploy/ 2>/dev/null || true

      - name: Deploy to Neocities
        uses: jonchang/deploy-neocities@master
        with:
          key: ${{ secrets.NEOCITIES_API_KEY }}
          dir: deploy
