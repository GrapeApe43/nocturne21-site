name: Deploy to Neocities

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create deploy folder
        run: |
          rm -rf deploy
          mkdir deploy
          cp -r css deploy/ 2>/dev/null || true
          cp -r js deploy/ 2>/dev/null || true
          cp -r img deploy/ 2>/dev/null || true
          cp -r fonts deploy/ 2>/dev/null || true
          cp -r audio deploy/ 2>/dev/null || true
          cp -r comics deploy/ 2>/dev/null || true
          cp *.html deploy/ 2>/dev/null || true
          cp *.xml deploy/ 2>/dev/null || true
          cp *.txt deploy/ 2>/dev/null || true
          cp *.json deploy/ 2>/dev/null || true
          cp favicon.* deploy/ 2>/dev/null || true

      - name: Deploy to Neocities
        uses: jonchang/deploy-neocities@master
        with:
          key: ${{ secrets.NEOCITIES_API_KEY }}
          dir: deploy
