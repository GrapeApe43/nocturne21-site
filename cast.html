  <style>
    .n21-cast-wrap {
      --n21-panel-color: #000;
      max-width: 1000px;
      margin: 0 auto;
    }

    .n21-cast-layout {
      display: flex;
      gap: 0;
      align-items: stretch;
      max-width: 1000px;
      margin: 20px auto 0;
    }

    .n21-cast-tabs {
  width: 88px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  overflow-x: visible;
  padding-top: 8px;
  margin-right: -8px;
  scrollbar-width: none;
  position: relative;
  z-index: 3;
}

    .n21-cast-tabs::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .n21-cast-tab {
      width: 100%;
      display: block;
      box-sizing: border-box;
      cursor: pointer;
      border: 2px solid transparent;
      border-right: none;
      border-radius: 14px 0 0 14px;
      position: relative;
      z-index: 1;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .n21-cast-tab:hover {
      transform: translateX(-4px);
      filter: brightness(1.06);
    }

   .n21-cast-tab.active {
  transform: translateX(-6px);
 
  z-index: 4;
}

.n21-cast-tab.active::after {
  content: "";
  position: absolute;
  top: -2px;
  right: -10px;
  width: 12px;
  height: calc(100% + 4px);
  background: inherit;
  z-index: 5;
}

#characterDisplay.n21-cast-display {
  flex: 1;
  min-width: 0;
  min-height: 620px;
  border: none !important;
  outline: none !important;
  border-left: none !important;
  border-radius: 12px 12px 12px 12px;
  background: var(--n21-panel-color) !important;
  padding: 22px;
  box-shadow: 0 0 18px rgba(0,0,0,0.2);
}

    .n21-cast-image-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 560px;
    }

    .n21-cast-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .n21-cast-bio {
      position: absolute;
      top: 4%;
      left: 4%;
      width: 34%;
      max-width: 300px;
      padding: 18px 18px 16px 18px;
      border-radius: 10px;
      color: #222;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
      border: 1px solid rgba(0,0,0,0.08);
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.94) 0px,
          rgba(255,255,255,0.94) 27px,
          rgba(120,180,255,0.35) 28px,
          rgba(255,255,255,0.94) 29px
        );
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .n21-cast-bio::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 18px;
      width: 2px;
      background: rgba(220, 70, 90, 0.45);
      border-radius: 2px;
    }

    .n21-cast-name {
      margin: 0 0 10px 0;
      padding-left: 16px;
      color: #111;
      line-height: 1.1;
      font-family: "Lacquer Regular", sans-serif;
    }

    .n21-cast-text {
      margin: 0;
      padding-left: 16px;
      color: #333;
      line-height: 2;
      font-size: 15px;
      font-family: "Patrick Hand", cursive;
    }
.n21-cast-text {
  color: #222;
  text-shadow: 0 1px 0 rgba(255,255,255,0.3);
}




    @media (max-width: 800px) {
      .n21-cast-layout {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .n21-cast-tabs {
        width: 100%;
        flex-direction: row;
        gap: 10px;
        overflow-x: auto;
        overflow-y: hidden;
        margin-right: 0;
        padding-top: 0;
      }

      .n21-cast-tab {
        width: 70px;
        flex-shrink: 0;
        border-radius: 10px;
        transform: none !important;
      }

      .n21-cast-tab.active::after {
        display: none;
      }

      #characterDisplay.n21-cast-display {
  min-height: 0;
  border: none !important;
  outline: none !important;
  border-radius: 15px;
  padding: 14px;
  background: var(--n21-panel-color) !important;
}

      .n21-cast-image-wrap {
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .n21-cast-image {
        width: 100%;
        height: auto;
      }

      .n21-cast-bio {
        position: relative;
        bottom: auto;
        left: auto;
        width: 90%;
        max-width: none;
        margin: 12px auto 0 auto;
      }

    
  </style>
</head>

  <script>
const characters = [
  {
    name: "Kai",
    image: "img/cast/profile-kai.png",
    bio: "Kai is a chaotic, sleep-deprived mess who somehow keeps moving forward. Equal parts sarcasm and vulnerability, he deflects with humor even when things get heavy.",
    color: "rgba(87,108,153,0.72)"   // #576C99
  },
  {
    name: "Kuro",
    image: "img/cast/profile-kuro.png",
    bio: "Kuro is more grounded, observant, and often the voice of reason—though not always the voice people want to hear.",
    color: "rgba(213,142,133,0.72)"  // #D58E85
  },
  {
    name: "Yoshiko",
    image: "img/cast/profile-yoshiko.png",
    bio: "Yoshiko is sharp, perceptive, and harder to read than she first appears. She notices more than she lets on.",
    color: "rgba(97,66,126,0.72)"    // #61427E
  },
  {
    name: "Shingen",
    image: "img/cast/profile-shingen.png",
    bio: "Shingen carries authority with him, but there’s always the sense that he knows more than he’s willing to say.",
    color: "rgba(177,126,54,0.72)"   // #B17E36
  },
  {
    name: "Kiri",
    image: "img/cast/profile-kiri.png",
    bio: "Kiri is unpredictable, energetic, and difficult to pin down. He can be disarming one second and unsettling the next.",
    color: "rgba(84,95,100,0.72)"    // #545F64
  },
  {
    name: "Dream Lady",
    image: "img/cast/profile-dreamlady.png",
    bio: "She exists somewhere between dream and nightmare, impossible to fully understand and impossible to ignore.",
    color: "rgba(160,190,202,0.72)"  // #A0BECA
  },
  {
    name: "Stranger",
    image: "img/cast/profile-stranger.png",
    bio: "Not everything is what it seems, and the Stranger feels like the embodiment of that truth.",
    color: "rgba(253,218,172,0.72)"  // #FDDAAC
  }
];

    let currentIndex = 0;
    const tabs = document.querySelectorAll(".n21-cast-tab");

    tabs.forEach((tab, index) => {
      tab.addEventListener("click", () => showCharacter(index));
    });

    function showCharacter(index) {
      const char = characters[index];
      const img = document.getElementById("charImage");
      const bio = document.getElementById("charBio");

      tabs.forEach((tab, i) => {
        tab.classList.remove("active");
        tab.style.backgroundColor = characters[i].color;
      });

      tabs[index].classList.add("active");
      document.querySelector(".n21-cast-wrap").style.setProperty("--n21-panel-color", char.color);

      img.style.opacity = 0;
      img.style.transform = "translateX(18px)";
      bio.style.opacity = 0;
      bio.style.transform = "translateX(-10px)";

      setTimeout(() => {
        document.getElementById("charName").textContent = char.name;
        document.getElementById("charText").textContent = char.bio;
        img.src = char.image;

// convert rgba to lighter version
function lightenColor(color) {
  return color.replace(/rgba?\(([^)]+)\)/, (match, values) => {
    let [r, g, b, a] = values.split(',').map(v => parseFloat(v));
    
    // push toward white
    r = Math.min(255, r + 80);
    g = Math.min(255, g + 80);
    b = Math.min(255, b + 80);

    return `rgba(${r}, ${g}, ${b}, 0.85)`;
  });
}

const lightColor = lightenColor(char.color);

bio.style.background = `
  repeating-linear-gradient(
    to bottom,
    ${lightColor} 0px,
    ${lightColor} 27px,
    rgba(120,180,255,0.35) 28px,
    ${lightColor} 29px
  )
`;

        img.style.opacity = 1;
        img.style.transform = "translateX(0)";
        bio.style.opacity = 1;
        bio.style.transform = "translateX(0)";
      }, 180);

      currentIndex = index;
    }

    document.addEventListener("keydown", function(e) {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

      if (e.key === "ArrowDown") {
        e.preventDefault();
        showCharacter((currentIndex + 1) % characters.length);
      }

      if (e.key === "ArrowUp") {
        e.preventDefault();
        showCharacter((currentIndex - 1 + characters.length) % characters.length);
      }
    });

    function toggleShare(e) {
      e.preventDefault();
      document.getElementById("shareBar").classList.toggle("open");
    }

    function copyLink() {
      navigator.clipboard.writeText("https://nocturne21.com");
    }

    window.addEventListener("load", () => {
      showCharacter(0);
    });
  </script>
