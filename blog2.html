/* begin styles for RSS Feed */



.rss-box {
	 margin: 10px 5%;

	 background-color: #161528;
	 border: 2px #12a1ff;
}

.rss-title, rss-title a { 
	font-family: "lacquer";
	font-size: 18px;
	font-weight:bold;
	color: #ee4757;
	margin: 5px 0;
	padding: 0;
	letter-spacing: 1px;
}

.rss-items {
  
}

.rss-item img{
  max-width: 100%;
  
  }



.rss-item  {
  font-family: verdana, arial, sans-serif;
  font-size: 13px;
  color: #fff;
  font-weight : bold; 
  margin: 8px 0;
}

.rss-item a:link, .rss-item a:visited, .rss-item a:active {
  font-family: "lacquer";
	text-decoration : none;
	border-bottom: 1px solid #ededed;
	color: #ee4757;
	}

.rss-item a:hover { 
	text-decoration : none;
	color: #27ffff;
	border-bottom: 1px #e0861e;
	}
	
.rss-date {
	font-size: 11px;
	font-weight : bold;
	color: #5853AF;
	}


</style>
