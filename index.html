<script>
(function () {
  const STORAGE_KEY = "nocturne21_lastPage_v2";
  let lastSaved = null;

  function getPageFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("pg");
  }

  function saveCurrentPage(force = false) {
    const pg = getPageFromUrl();
    if (!pg) return;

    if (force || pg !== lastSaved) {
      localStorage.setItem(STORAGE_KEY, pg);
      lastSaved = pg;
      console.log("Saved current page:", pg);
    }
  }

  // Save immediately
  saveCurrentPage(true);

  // Save when returning from cache / back-forward navigation
  window.addEventListener("pageshow", function () {
    saveCurrentPage(true);
  });

  // Save on browser navigation
  window.addEventListener("popstate", function () {
    setTimeout(() => saveCurrentPage(true), 50);
  });

  // Save shortly after any click, in case your comic JS changes ?pg after the click
  document.addEventListener("click", function () {
    setTimeout(() => saveCurrentPage(true), 50);
  }, true);

  // Save when dropdown changes
  const menu = document.getElementById("menu1");
  if (menu) {
    menu.addEventListener("change", function () {
      setTimeout(() => saveCurrentPage(true), 50);
    });
  }

  // Catch JS-driven page changes that don't trigger normal navigation events
  let lastUrl = window.location.href;
  setInterval(function () {
    if (window.location.href !== lastUrl) {
      lastUrl = window.location.href;
      saveCurrentPage(true);
    }
  }, 500);
})();
</script>

<script>
(function () {
  const btn = document.getElementById("continueReadingBtn");
  if (!btn) return;

  const STORAGE_KEY = "nocturne21_lastPage_v2";
  let lastUrl = "";

  function getCurrentPage() {
    const params = new URLSearchParams(window.location.search);
    const pg = parseInt(params.get("pg"), 10);
    return isNaN(pg) ? null : pg;
  }

  function getSavedPage() {
    const saved = parseInt(localStorage.getItem(STORAGE_KEY), 10);
    return isNaN(saved) ? null : saved;
  }

  function updateContinueButton() {
    const currentPage = getCurrentPage();
    const savedPage = getSavedPage();

    if (!savedPage) {
      btn.classList.remove("show");
      return;
    }

    btn.href = "?pg=" + savedPage + "#showComic";

    /* show it whenever a saved page exists */
    btn.classList.add("show");
  }

  updateContinueButton();

  window.addEventListener("load", updateContinueButton);
  window.addEventListener("pageshow", updateContinueButton);
  window.addEventListener("popstate", function () {
    setTimeout(updateContinueButton, 50);
  });

  document.addEventListener("click", function () {
    setTimeout(updateContinueButton, 50);
  }, true);

  setInterval(function () {
    if (window.location.href !== lastUrl) {
      lastUrl = window.location.href;
      updateContinueButton();
    }
  }, 500);
})();
</script>
