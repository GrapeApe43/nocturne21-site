<h1 class="blog-title">✧ blog ✧</h1>

<div class="blog-container">

  <!-- Sidebar list -->
  <div class="blog-list">
<input type="text" id="search" placeholder="search..." class="search-box">
    <a href="blog.html?post=page5">Page 5 Update</a>
    <a href="blog.html?post=sketch1">Sketch Dump</a>
    <a href="blog.html?post=intro">First Post</a>
  </div>

  <!-- Main content -->
  <div id="blog-content" class="blog-content"></div>

</div>

<script>
const posts = [

{
  id: "page5",
  title: "Page 5 Update",
  date: "2026-03-20",
  tags: ["comic", "update"],
  comicPage: "index.html",
  content: `
    <img src="images/sketch1.png" class="blog-img">
    <p>This page took forever 😭 but I love the glow.</p>
  `
},

{
  id: "sketch1",
  title: "Sketch Dump",
  date: "2026-03-18",
  tags: ["art"],
  content: `
    <img src="images/sketch2.png" class="blog-img">
    <p>Some rough sketches.</p>
  `
},

{
  id: "intro",
  title: "First Post",
  date: "2026-03-15",
  tags: ["general"],
  content: `
    <p>Starting a blog ✧</p>
  `
}

];

// SORT newest first
posts.sort((a,b) => new Date(b.date) - new Date(a.date));

const params = new URLSearchParams(window.location.search);
const postId = params.get("post");

const container = document.getElementById("blog-content");

// SEARCH
const searchInput = document.getElementById("search");

if (searchInput) {
  searchInput.addEventListener("input", () => {
    renderList(searchInput.value.toLowerCase());
  });
}

// TAG FILTER
function renderList(filter="") {
  const list = document.querySelector(".blog-list");
  list.innerHTML = "";

  posts.forEach(post => {
    if (
      post.title.toLowerCase().includes(filter) ||
      post.tags.join(" ").includes(filter)
    ) {
      list.innerHTML += `
        <a href="?post=${post.id}">
          ${post.title}
        </a>
      `;
    }
  });
}

renderList();

// DISPLAY POST
if (!postId) {
  container.innerHTML = "<p>Select a post ✧</p>";
} else {
  const index = posts.findIndex(p => p.id === postId);
  const post = posts[index];

  if (!post) {
    container.innerHTML = "<p>Post not found</p>";
  } else {

    let prev = posts[index + 1];
    let next = posts[index - 1];

    container.innerHTML = `
      <h2>${post.title}</h2>
      <p class="date">${post.date}</p>

      ${post.comicPage ? `<p><a href="${post.comicPage}">→ Read this comic page</a></p>` : ""}

      ${post.content}

      <div class="tags">
        ${post.tags.map(t => `<span>#${t}</span>`).join("")}
      </div>

      <div class="blog-nav">
        ${prev ? `<a href="?post=${prev.id}">← previous</a>` : ""}
        ${next ? `<a href="?post=${next.id}">next →</a>` : ""}
      </div>

      <div id="cusdis_thread"
        data-host="https://cusdis.com"
        data-app-id="YOUR_APP_ID"
        data-page-id="${post.id}"
        data-page-url="${location.href}"
        data-page-title="${post.title}">
      </div>
      <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
    `;
  }
}
</div>

</script>
